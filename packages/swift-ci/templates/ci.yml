# @devground/swift-ci — CI de build + test para un paquete/monorepo Swift.
# Nota: los runners de GitHub retrasan versiones nuevas de Xcode días a semanas;
# fija la versión disponible en el runner (revisa las imágenes de GitHub-hosted).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Seleccionar Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app

      - name: Versión de Swift
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

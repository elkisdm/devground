# @devground/swift-format-config — reglas base de SwiftLint
# Se copia a la raíz del repo destino como .swiftlint.yml
# Límites de tamaño alineados con la política de devground (ver docs/adr/0010 de devground:
# límite de módulo/función) para consistencia entre stacks TS y Swift.

disabled_rules:
  - todo
  # SwiftFormat es dueño del formato: mantiene comas finales multilínea (idiomático,
  # mejor para diffs). Se desactiva aquí para no chocar con SwiftFormat.
  - trailing_comma

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - sorted_first_last
  - unneeded_parentheses_in_closure_argument
  - redundant_nil_coalescing

line_length:
  warning: 100
  error: 140
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - to
    - at

force_cast: error
force_try: error

# Excluir artefactos de build y dependencias.
excluded:
  - .build
  - .swiftpm
  - DerivedData

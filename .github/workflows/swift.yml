name: Swift

on:
  push:
    branches: [main]
    paths:
      - 'swift-foundation/**'
      - '.github/workflows/swift.yml'
  pull_request:
    branches: [main]
    paths:
      - 'swift-foundation/**'
      - '.github/workflows/swift.yml'

permissions:
  contents: read

concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Swift Build & Test
    runs-on: macos-26
    defaults:
      run:
        working-directory: swift-foundation
    steps:
      - uses: actions/checkout@v4

      # Package.swift declara tools-version 6.2 (Swift 6.2 => Xcode 26).
      - name: Seleccionar Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE"; fi

      - name: Versión de Swift
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

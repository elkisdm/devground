version: 2

updates:
  # Root workspace + all packages
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Santiago
    open-pull-requests-limit: 5
    versioning-strategy: increase
    ignore:
      # ADR-0026 (fase de consolidación): los majors son trabajo de migración,
      # no de consolidación. Reevaluar al salir de la fase.
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    groups:
      # Group dev dependencies together to reduce PR noise
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Group production dependencies separately
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Santiago
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - ci
